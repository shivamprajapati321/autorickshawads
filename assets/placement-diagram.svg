<svg viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg" font-family="Barlow Condensed, Arial, sans-serif">
<defs>
<style>
.zone{fill:#FFB800;opacity:.85}
.zlabel{fill:#0E0E10;font-weight:800;font-size:15px}
.zline{stroke:#FFB800;stroke-width:2;stroke-dasharray:4 3}
.body{fill:#1A1A1E;stroke:#2E2E35;stroke-width:2}
.hood{fill:#242429;stroke:#2E2E35;stroke-width:2}
.wheel{fill:#0E0E10;stroke:#3a3a42;stroke-width:2}
.tag{fill:#0E0E10;stroke:#FFB800;stroke-width:1.5}
.tagtext{fill:#FFB800;font-weight:700;font-size:13px}
</style>
</defs>
<rect width="520" height="420" fill="none"/>

<!-- rear view rickshaw -->
<!-- hood (top canopy) -->
<path d="M150 90 Q260 40 370 90 L370 175 Q260 155 150 175 Z" class="hood"/>
<!-- HOOD ad zone highlight -->
<path d="M165 100 Q260 62 355 100 L355 168 Q260 150 165 168 Z" class="zone" opacity=".55"/>
<text x="260" y="140" text-anchor="middle" class="zlabel">HOOD AD</text>

<!-- body -->
<rect x="150" y="175" width="220" height="150" rx="12" class="body"/>
<!-- BACK PANEL ad zone -->
<rect x="172" y="192" width="176" height="66" rx="6" class="zone"/>
<text x="260" y="232" text-anchor="middle" class="zlabel">BACK PANEL AD</text>

<!-- grille -->
<rect x="200" y="270" width="120" height="42" rx="6" fill="#0E0E10" stroke="#2E2E35"/>
<line x1="210" y1="280" x2="310" y2="280" stroke="#2E2E35"/>
<line x1="210" y1="290" x2="310" y2="290" stroke="#2E2E35"/>
<line x1="210" y1="300" x2="310" y2="300" stroke="#2E2E35"/>

<!-- tail lights -->
<rect x="160" y="270" width="26" height="42" rx="5" fill="#FF4D3D" opacity=".8"/>
<rect x="334" y="270" width="26" height="42" rx="5" fill="#FF4D3D" opacity=".8"/>

<!-- wheels -->
<circle cx="185" cy="335" r="22" class="wheel"/>
<circle cx="335" cy="335" r="22" class="wheel"/>
<!-- bumper -->
<rect x="150" y="340" width="220" height="12" rx="6" fill="#FFB800" opacity=".7"/>

<!-- callout tags -->
<!-- hood tag -->
<line x1="370" y1="120" x2="440" y2="105" class="zline"/>
<rect x="440" y="90" width="70" height="30" rx="6" class="tag"/>
<text x="475" y="110" text-anchor="middle" class="tagtext">4-SIDE</text>

<!-- back panel tag -->
<line x1="348" y1="225" x2="440" y2="210" class="zline"/>
<rect x="440" y="195" width="70" height="30" rx="6" class="tag"/>
<text x="475" y="215" text-anchor="middle" class="tagtext">EYE-LEVEL</text>

<!-- side tag (left) -->
<line x1="150" y1="130" x2="70" y2="115" class="zline"/>
<rect x="10" y="100" width="70" height="30" rx="6" class="tag"/>
<text x="45" y="120" text-anchor="middle" class="tagtext">SIDE</text>
</svg>