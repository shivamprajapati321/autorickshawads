<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="Barlow Condensed, Arial, sans-serif">
<defs>
<style>
.bg{fill:#0E0E10}
.card{fill:#1A1A1E;stroke:#2E2E35;stroke-width:1.5;rx:14}
.zone{fill:#FFB800;opacity:.9}
.body{fill:#242429;stroke:#3a3a42;stroke-width:2}
.wheel{fill:#0E0E10;stroke:#4a4a52;stroke-width:2}
.dim{stroke:#0E0E10;stroke-width:3}
.dimw{stroke:#FFB800;stroke-width:2.5}
.mtext{fill:#0E0E10;font-weight:800;font-size:20px}
.wtext{fill:#FFB800;font-weight:800;font-size:20px}
.title{fill:#F5F5F2;font-weight:800;font-size:26px}
.label{fill:#8A8A93;font-weight:700;font-size:15px;letter-spacing:1px}
.win{fill:none;stroke:#0E0E10;stroke-width:2}
.wintext{fill:#0E0E10;font-weight:700;font-size:12px}
</style>
</defs>
<rect width="900" height="640" class="bg"/>

<!-- ============ LEFT SIDE view ============ -->
<text x="150" y="40" text-anchor="middle" class="label">LEFT SIDE</text>
<g transform="translate(40,55)">
  <!-- simplified rickshaw side body -->
  <path d="M20 120 Q30 60 90 55 L200 55 Q230 58 235 95 L235 150 L20 150 Z" class="body"/>
  <!-- yellow hood zone (front-left panel) -->
  <path d="M30 118 Q38 68 92 63 L150 63 L150 145 L30 145 Z" class="zone"/>
  <circle cx="70" cy="165" r="22" class="wheel"/>
  <circle cx="200" cy="165" r="22" class="wheel"/>
  <!-- dims 18 x 18 -->
  <line x1="45" y1="135" x2="45" y2="75" class="dim" marker-end="url(#ar)"/>
  <text x="55" y="105" class="mtext">18"</text>
  <line x1="45" y1="135" x2="120" y2="135" class="dim" marker-end="url(#ar)"/>
  <text x="70" y="128" class="mtext">18"</text>
</g>

<!-- ============ RIGHT SIDE view ============ -->
<text x="600" y="40" text-anchor="middle" class="label">RIGHT SIDE</text>
<g transform="translate(490,55)">
  <path d="M235 120 Q225 60 165 55 L55 55 Q25 58 20 95 L20 150 L235 150 Z" class="body"/>
  <path d="M225 118 Q217 68 163 63 L105 63 L105 145 L225 145 Z" class="zone"/>
  <circle cx="185" cy="165" r="22" class="wheel"/>
  <circle cx="55" cy="165" r="22" class="wheel"/>
  <line x1="210" y1="135" x2="210" y2="75" class="dim" marker-end="url(#ar)"/>
  <text x="185" y="105" class="mtext">18"</text>
  <line x1="210" y1="135" x2="135" y2="135" class="dim" marker-end="url(#ar)"/>
  <text x="150" y="128" class="mtext">18"</text>
</g>

<!-- ============ BACK view ============ -->
<text x="450" y="330" text-anchor="middle" class="label">BACK (REAR)</text>
<g transform="translate(320,345)">
  <!-- top canopy strip -->
  <path d="M20 40 Q130 5 240 40 L240 70 L20 70 Z" class="body"/>
  <rect x="35" y="30" width="190" height="34" rx="4" class="zone"/>
  <text x="130" y="53" text-anchor="middle" class="mtext">27"W X 7"H</text>
  <!-- main back panel -->
  <rect x="20" y="70" width="220" height="150" rx="10" class="body"/>
  <rect x="35" y="82" width="190" height="110" rx="6" class="zone"/>
  <!-- window cutout -->
  <ellipse cx="130" cy="112" rx="34" ry="17" class="win"/>
  <text x="130" y="109" text-anchor="middle" class="wintext">Window</text>
  <text x="130" y="122" text-anchor="middle" class="wintext">8"W X 3"H</text>
  <!-- 17H dim -->
  <line x1="55" y1="185" x2="55" y2="130" class="dim" marker-end="url(#ar)"/>
  <text x="62" y="162" class="mtext">17"H</text>
  <!-- 40W dim -->
  <line x1="90" y1="175" x2="200" y2="175" class="dim" marker-end="url(#ar)"/>
  <text x="120" y="168" class="mtext">40"W</text>
  <!-- grille -->
  <rect x="70" y="200" width="120" height="34" rx="5" fill="#0E0E10" stroke="#3a3a42"/>
  <circle cx="45" cy="240" r="18" class="wheel"/>
  <circle cx="215" cy="240" r="18" class="wheel"/>
</g>

<defs>
<marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#0E0E10"/></marker>
</defs>
</svg>