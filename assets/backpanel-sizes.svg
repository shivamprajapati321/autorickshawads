<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Barlow Condensed, Arial, sans-serif">
<defs>
<style>
.bg{fill:#0E0E10}
.body{fill:#242429;stroke:#3a3a42;stroke-width:2}
.zone{fill:#FFB800;opacity:.9}
.wheel{fill:#0E0E10;stroke:#4a4a52;stroke-width:2}
.hood{fill:#1A1A1E;stroke:#3a3a42;stroke-width:2}
.mtext{fill:#0E0E10;font-weight:800;font-size:22px}
.label{fill:#8A8A93;font-weight:700;font-size:15px;letter-spacing:1px}
.sizetag{fill:#FFB800;font-weight:800;font-size:19px}
.grille{fill:#0E0E10;stroke:#3a3a42;stroke-width:1.5}
</style>
<marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#0E0E10"/></marker>
</defs>
<rect width="900" height="480" class="bg"/>

<!-- three rickshaw backs, each showing one size -->
<!-- ===== Size 1: 36x18 ===== -->
<text x="150" y="40" text-anchor="middle" class="label">SIZE 1</text>
<g transform="translate(55,55)">
  <path d="M15 55 Q95 20 175 55 L175 80 L15 80 Z" class="hood"/>
  <rect x="15" y="80" width="160" height="120" rx="10" class="body"/>
  <!-- back panel zone (wide, short) 36x18 -->
  <rect x="28" y="92" width="134" height="62" rx="5" class="zone"/>
  <text x="95" y="128" text-anchor="middle" class="mtext">36"×18"</text>
  <rect x="55" y="162" width="80" height="28" rx="4" class="grille"/>
  <circle cx="35" cy="210" r="16" class="wheel"/>
  <circle cx="155" cy="210" r="16" class="wheel"/>
</g>
<text x="150" y="300" text-anchor="middle" class="sizetag">36"W × 18"H</text>

<!-- ===== Size 2: 24x24 ===== -->
<text x="450" y="40" text-anchor="middle" class="label">SIZE 2</text>
<g transform="translate(355,55)">
  <path d="M15 55 Q95 20 175 55 L175 80 L15 80 Z" class="hood"/>
  <rect x="15" y="80" width="160" height="120" rx="10" class="body"/>
  <!-- square 24x24 -->
  <rect x="55" y="88" width="80" height="80" rx="5" class="zone"/>
  <text x="95" y="134" text-anchor="middle" class="mtext">24"×24"</text>
  <rect x="55" y="172" width="80" height="20" rx="4" class="grille"/>
  <circle cx="35" cy="210" r="16" class="wheel"/>
  <circle cx="155" cy="210" r="16" class="wheel"/>
</g>
<text x="450" y="300" text-anchor="middle" class="sizetag">24"W × 24"H</text>

<!-- ===== Size 3: 36x24 ===== -->
<text x="750" y="40" text-anchor="middle" class="label">SIZE 3</text>
<g transform="translate(655,55)">
  <path d="M15 55 Q95 20 175 55 L175 80 L15 80 Z" class="hood"/>
  <rect x="15" y="80" width="160" height="120" rx="10" class="body"/>
  <!-- large 36x24 -->
  <rect x="28" y="88" width="134" height="84" rx="5" class="zone"/>
  <text x="95" y="136" text-anchor="middle" class="mtext">36"×24"</text>
  <rect x="55" y="176" width="80" height="16" rx="4" class="grille"/>
  <circle cx="35" cy="210" r="16" class="wheel"/>
  <circle cx="155" cy="210" r="16" class="wheel"/>
</g>
<text x="750" y="300" text-anchor="middle" class="sizetag">36"W × 24"H</text>

<!-- footnote -->
<text x="450" y="360" text-anchor="middle" class="label">CHOOSE THE SIZE THAT FITS YOUR BUDGET &amp; MESSAGE</text>
</svg>